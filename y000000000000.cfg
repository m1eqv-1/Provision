##########################################################
# Yealink Bootstrap Provisioning Config
# Delivery  : DHCP Option 66 (HTTP server)
# Filename  : y000000000000.cfg  (applies to all models)
#
# Purpose   : Apply base settings that cannot be set on the
#             main provisioning server, then redirect the
#             phone to the main server for full account and
#             line configuration.
##########################################################

# ---------------------------------------------------------
# 1. DISABLE IPv6  (0 = IPv4 only)
# ---------------------------------------------------------
network.ip_address_mode = 0

# ---------------------------------------------------------
# 2. RINGER VOLUME  (range: 0 - 15)
# ---------------------------------------------------------
voice.ring_vol = 2

# ---------------------------------------------------------
# 3. REDIRECT TO MAIN PROVISIONING SERVER
#    Phone will pull full config from this server after
#    applying the settings above.
# ---------------------------------------------------------
auto_provision.server.url = http://voice.commsphere.org.uk/phoneprov/f568f8c2df8dcc4f

#Configure the username and password for downloading.
auto_provision.server.username = Commsphere
auto_provision.server.password = 06Lizzie2003
#Enable or disable the Plug and Play feature; 0-Disabled, 1-Enabled(default);
auto_provision.pnp_enable = 1
#Enable or disable the phone to check new configuration when powered on; 0-Disabled, 1-Enabled (default);
auto_provision.mode = 1
